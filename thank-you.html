<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! Your Guide is Ready — Max's AI Solutions</title>
    <meta name="description" content="Your purchase is complete. Download your guide now.">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .thankyou-hero {
            position: relative;
            padding: 160px 0 100px;
            overflow: hidden;
            text-align: center;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thankyou-hero .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(79,70,229,0.25), transparent),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(124,58,237,0.15), transparent),
                radial-gradient(ellipse 40% 30% at 10% 80%, rgba(245,158,11,0.1), transparent);
            pointer-events: none;
        }

        .thankyou-inner {
            position: relative;
            z-index: 1;
            max-width: 660px;
            margin: 0 auto;
        }

        .thankyou-emoji {
            font-size: 4rem;
            margin-bottom: 24px;
        }

        .thankyou-inner h1 {
            margin-bottom: 16px;
        }

        .thankyou-inner .subheadline {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 520px;
            margin: 0 auto 40px;
            line-height: 1.7;
        }

        .download-btn {
            display: inline-block;
            padding: 18px 48px;
            background: var(--gradient);
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: var(--radius-xl);
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-glow);
            margin-bottom: 24px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(79,70,229,0.5);
        }

        .next-steps {
            margin-top: 48px;
            text-align: left;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 32px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        .next-steps h3 {
            margin-bottom: 16px;
            text-align: center;
        }

        .next-steps ul {
            list-style: none;
            padding: 0;
        }

        .next-steps li {
            padding: 8px 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .next-steps li::before {
            content: "⚡ ";
        }

        .next-steps .cta-line {
            margin-top: 20px;
            text-align: center;
        }

        .next-steps .cta-line a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
        }

        .next-steps .cta-line a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="Max's AI Solutions" class="logo-img">
                
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#services">Services</a></li>
                <li><a href="training.html">Free Training</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="demos.html">Try It Live</a></li>
                <li><a href="phone-answering.html">Phone Answering</a></li>
            </ul>
        </div>
    </nav>

    <!-- Thank You -->
    <section class="thankyou-hero">
        <div class="hero-bg"></div>
        <div class="thankyou-inner container" id="thankYouContent">
            <!-- Content injected by JS based on purchase type -->
        </div>
    </section>

    <script>
        // Detect purchase type from URL param or referrer
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'guide'; // guide | single | bundle | monthly | partner

        const content = {
            guide: {
                emoji: '🎉',
                title: 'Download Your <span class="gradient-text">Free Guide</span>',
                sub: 'Your copy of the 5 AI Wins guide is ready. Click below to download it right now.',
                action: '<a href="5-AI-Wins-for-Small-Business.pdf" download class="download-btn">📥 Download Your PDF Guide</a>',
                steps: [
                    'Start with Win #1 — it takes 10 minutes',
                    'Try to knock out all 5 wins this week while momentum is fresh',
                    'Ready to go deeper? <a href="academy.html">Check out the AI Business Academy</a>',
                    'Want it done for you? <a href="index.html#contact">Let’s talk</a>'
                ]
            },
            single: {
                emoji: '📚',
                title: 'Welcome to the <span class="gradient-text">AI Business Academy</span>',
                sub: 'Your course access is confirmed. We’re setting up your content now — you’ll receive an email within 24 hours with your direct access link.',
                action: '<a href="index.html#contact" class="download-btn">⚡ Questions? Reach Out</a>',
                steps: [
                    'Check your email within 24 hours for your course access link',
                    'Your content is hosted in a private, organized folder — available 24/7',
                    'Each module ends with one action item — do it before moving on',
                    'When our full platform launches (coming soon), you’ll get a login automatically — free upgrade'
                ]
            },
            bundle: {
                emoji: '🎓',
                title: 'You Got <span class="gradient-text">Everything.</span>',
                sub: 'Full curriculum access confirmed — all 3 tracks from beginner to advanced. Your access link is on its way to your email within 24 hours.',
                action: '<a href="academy.html" class="download-btn">📚 Back to Academy</a>',
                steps: [
                    'Check your email within 24 hours for your full curriculum access link',
                    'Start with Track 1 even if you have some AI experience — the foundation matters',
                    'Work through one module per day and you’ll be done in under 3 weeks',
                    'Full platform with progress tracking launches in 30 days — you’ll be first in'
                ]
            },
            monthly: {
                emoji: '🔄',
                title: 'Membership <span class="gradient-text">Activated.</span>',
                sub: 'Welcome to the AI Business Academy monthly membership. Your access link is on its way within 24 hours — new content added every month.',
                action: '<a href="academy.html" class="download-btn">📚 Back to Academy</a>',
                steps: [
                    'Check your email within 24 hours for your membership access link',
                    'New lessons drop monthly — we’ll email you when new content is live',
                    'Cancel anytime from your Stripe dashboard — no questions asked',
                    'Full platform with student dashboard launches in 30 days — you’ll get it automatically'
                ]
            },
            partner: {
                emoji: '🤝',
                title: 'Welcome to the <span class="gradient-text">Partner Program.</span>',
                sub: 'Your partner training access is confirmed. This is a big move — we take it seriously. Expect a personal email from us within 24 hours with everything you need to get started.',
                action: '<a href="index.html#contact" class="download-btn">⚡ We’ll Be In Touch</a>',
                steps: [
                    'Watch for a personal welcome email within 24 hours',
                    'You’ll get full access to the Partner Track + the complete curriculum',
                    'We’ll walk you through the first steps together',
                    'You’re now part of the Max’s AI Solutions partner network — let’s build something'
                ]
            }
        };

        const c = content[type] || content.guide;
        document.getElementById('thankYouContent').innerHTML = `
            <div class="thankyou-emoji">${c.emoji}</div>
            <h1>${c.title}</h1>
            <p class="subheadline">${c.sub}</p>
            ${c.action}
            <div class="next-steps" style="margin-top:48px;">
                <h3>What Happens Next</h3>
                <ul>${c.steps.map(s => `<li>${s}</li>`).join('')}</ul>
                <div class="cta-line"><a href="index.html#contact">Questions? Get in touch →</a></div>
            </div>
        `;

        // Apply gradient to h1 spans
        document.querySelectorAll('.gradient-text').forEach(el => {
            el.style.cssText = 'background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;';
        });
    </script>

    <!-- Footer -->
    <footer style="text-align: center; padding: 40px 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem;">
        <div class="container">
            <p>© 2026 Max's AI Solutions. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');
        if (navToggle && navLinks) {
            navToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                navToggle.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
